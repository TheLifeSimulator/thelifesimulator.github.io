<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LifeSimulator</title>
        <link rel="icon" type="image/x-icon" href="/Assets/Icons/favicon.ico">
        <!-- Core -->
        <link rel="stylesheet" href="Styles/Pages/home.css">
        <link rel="stylesheet" href="Styles/Core/accessibility.css">
        <link rel="stylesheet" href="Styles/Core/layout.css">
        <link rel="stylesheet" href="Styles/Core/theme.css">
        <!-- Components -->
        <link rel="stylesheet" href="Styles/Components/buttons.css">
        <link rel="stylesheet" href="Styles/Components/card.css">
        <link rel="stylesheet" href="Styles/Components/flex.css">
        <link rel="stylesheet" href="Styles/Components/hero.css">
        <link rel="stylesheet" href="Styles/Components/images.css">
         <!-- Layout -->
        <script src="Scripts/Pages/index.js" defer></script>
        <script src="Scripts/Core/accessibility.js" defer></script>
        <script src="Scripts/Core/layout.js"></script>
        <script src="Scripts/Core/assets.js"></script>
        <!-- Components -->
        <script src="Scripts/Components/gallery.js" defer></script>
        <script src="Scripts/Components/card.js"></script>
        <script src="Scripts/Components/hero.js"></script>
        <script src="Scripts/Components/log.js"></script>
    </head>
    <body id="body">
        <div id="accessibility"></div>
        <header id="header"></header>
        <main id="content">
            <div id="hero">
                <script>hero("hero", "Assets/Elements/hero.info");</script>
            </div>
            <div class="flex">
                <div class="columns">
                    <div class="column">
                        <h2 class="title">Description</h2>
                        <div id="description">
                            <script>card("description", "card", null, "Assets/Elements/description.info");</script>
                        </div>
                        <h2 class="title">Updates</h2>
                        <div id="logs"></div>
                        <div id="controls">
                            <script>controls(document.getElementById("controls"), [ "View More = https://lifesimulator.itch.io/lifesim/devlog" ] )</script>
                        </div>
                    </div>
                    <div id="screenshots" class="column"  style="width: 100%">
                        <h2 class="title">Screenshots</h2>
                        <div id="content" class="card" style="padding: var(--spacing-single);">
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
