<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LifeSimulator | About</title>
        <link rel="icon" type="image/x-icon" href="../Assets/Icons/favicon.ico">
        <!-- Core -->
        <link rel="stylesheet" href="../Styles/Pages/about.css">
        <link rel="stylesheet" href="../Styles/Core/accessibility.css">
        <link rel="stylesheet" href="../Styles/Core/layout.css">
        <link rel="stylesheet" href="../Styles/Core/theme.css">
        <!-- Components -->
        <link rel="stylesheet" href="../Styles/Components/banner.css">
        <link rel="stylesheet" href="../Styles/Components/buttons.css">
        <link rel="stylesheet" href="../Styles/Components/card.css">
        <link rel="stylesheet" href="../Styles/Components/flex.css">
        <link rel="stylesheet" href="../Styles/Components/images.css">
        <!-- Layout -->
        <script src="../Scripts/Core/accessibility.js" defer></script>
        <script src="../Scripts/Core/layout.js"></script>
        <script src="../Scripts/Core/assets.js"></script>
        <!-- Component -->
        <script src="../Scripts/Components/card.js"></script>
        <script src="../Scripts/Components/banner.js"></script>
    </head>
    <body id="body">
        <div id="accessibility"></div>
        <header id="header" class="about"></header>
        <main id="content">
            <div class="stack">
                <div id="banner" style="background-color: var(--color-dark-accent);">
                    <script>card("banner", "banner", null, "../Assets/Elements/banner.info");</script>
                </div>
                <img class="strip" src="../Assets/Images/Strips/LifeSim_Strip_1.png">
                <div class="flex">
                    <div class="columns">
                        <div class="column" id="profile">
                            <script>card("profile", "card", null, "../Assets/Elements/profile.info")</script>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
