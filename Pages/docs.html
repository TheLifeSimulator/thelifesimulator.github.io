<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LifeSimulator | Docs</title>
        <link rel="icon" type="image/x-icon" href="../Assets/Icons/favicon.ico">
        <!-- Core -->
        <link rel="stylesheet" href="../Styles/Pages/docs.css">
        <link rel="stylesheet" href="../Styles/Core/accessibility.css">
        <link rel="stylesheet" href="../Styles/Core/layout.css">
        <link rel="stylesheet" href="../Styles/Core/theme.css">
        <!-- Components -->
        <link rel="stylesheet" href="../Styles/Components/buttons.css">
        <link rel="stylesheet" href="../Styles/Components/card.css">
        <link rel="stylesheet" href="../Styles/Components/flex.css">
        <link rel="stylesheet" href="../Styles/Components/images.css">
        <!-- Scripts -->
        <script src="../Scripts/accessibility.js" defer></script>
        <script src="../Scripts/layout.js" defer></script>
        <script src="../Scripts/log.js"></script>
        <script src="../Scripts/news.js"></script>
    </head>
    <body id="body">
        <div id="accessibility"></div>
        <header id="header" class="docs"></header>
        <main id="content">
            <h1 class="title">Documents</h1>
            <img class="cover" src="../Assets/Images/LifeSim_Splash.png">
            <div class="flex" id="sections">
                <div class="columns">
                    <div class="column" style="flex-basis: 66%;">
                        <h2 class="title">News</h2>
                        <div id="news">
                            <script>
                                news_import("news",  "../Assets/News/Updates/V." + version + ".info")
                            </script>
                        </div>
                        <div id="latest">
                            <script>
                                log_import("latest", "../Assets/Releases/Alpha/V." + version + ".info");
                            </script>
                        </div>
                        <div class="controls">
                            <button><a href="https://lifesimulator.itch.io/lifesim/devlog">View More</a></button>
                        </div>
                    </div>
                    <div class="column" id="logs" style="flex-basis: 33%;">
                        <h2 class="title">Updates</h2>
                        <div class="card" id="options">
                            <button>0.1.6 Alpha</button>
                            <button>0.1.5 Alpha</button>
                            <button>0.1.4 Alpha</button>
                            <button>View All</button>
                        </div>
                        <h2 class="title">Archive</h2>
                        <div class="card" id="options">
                            <button>0.1.1 Alpha</button>
                            <button>0.1.2 Alpha</button>
                            <button>0.1.3 Alpha</button>
                            <button>View All</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
