<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LifeSimulator | Docs</title>
        <link rel="icon" type="image/x-icon" href="../Assets/Icons/favicon.ico">
        <!-- Core -->
        <link rel="stylesheet" href="../Styles/Pages/docs.css">
        <link rel="stylesheet" href="../Styles/Core/accessibility.css">
        <link rel="stylesheet" href="../Styles/Core/layout.css">
        <link rel="stylesheet" href="../Styles/Core/theme.css">
        <!-- Components -->
        <link rel="stylesheet" href="../Styles/Components/buttons.css">
        <link rel="stylesheet" href="../Styles/Components/card.css">
        <link rel="stylesheet" href="../Styles/Components/flex.css">
        <link rel="stylesheet" href="../Styles/Components/images.css">
         <!-- Layout -->
        <script src="../Scripts/Core/accessibility.js" defer></script>
        <script src="../Scripts/Core/layout.js"></script>
        <script src="../Scripts/Core/assets.js"></script>
        <!-- Components -->
        <script src="../Scripts/Components/card.js"></script>
        <script src="../Scripts/Components/log.js"></script>
    </head>
    <body id="body">
        <div id="accessibility"></div>
        <header id="header" class="docs"></header>
        <main id="content">
            <h1 class="title">Documents</h1>
            <img class="cover" src="../Assets/Images/LifeSim_Splash.png">
            <div class="flex" id="sections">
                <div class="columns">
                    <div id="showcase" class="column" style="flex-basis: 66%;">
                        <h2 class="title">News</h2>
                        <div id="latest">
                            <script>card("latest", "card", null, "../Assets/News/Updates/V." + version + ".info")</script>
                            <script>log("latest", "../Assets/Releases/Alpha/V." + version + ".info");</script>
                        </div>
                        <script>controls(document.getElementById("showcase"), [ "View More = https://lifesimulator.itch.io/lifesim/devlog" ])</script>
                    </div>
                    <div class="column" id="logs" style="flex-basis: 33%;">
                        <h2 class="title">Logs</h2>
                        <script>card("logs", "div", null, "../Assets/News/updates.info");</script>
                        <script>card("logs", "div", null, "../Assets/News/archive.info");</script>
                    </div>
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
