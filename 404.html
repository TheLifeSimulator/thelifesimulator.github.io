<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LifeSimulator | Error 404</title>
        <link rel="icon" type="image/x-icon" href="/Assets/Icons/favicon.ico">
        <!-- Core -->
        <link rel="stylesheet" href="Styles/Pages/404.css">
        <link rel="stylesheet" href="Styles/Core/accessibility.css">
        <link rel="stylesheet" href="Styles/Core/layout.css">
        <link rel="stylesheet" href="Styles/Core/theme.css">
        <!-- Components -->
        <link rel="stylesheet" href="Styles/Components/buttons.css">
        <link rel="stylesheet" href="Styles/Components/card.css">
        <link rel="stylesheet" href="Styles/Components/ribbon.css">
        <!-- Scripts -->
        <script src="../Scripts/Core/accessibility.js" defer></script>
        <script src="../Scripts/Core/layout.js" defer></script>
    </head>
    <body id="body">
        <div id="accessibility"></div>
        <header id="header"></header>
        <main id="visual" style="background-image: url(Assets/Images/LifeSim_404.png)">
            <div class="card">
                <h2 class="title">Error 404!</h2>
                <h3 class="subtitle">Page not found!</h3>
                <p class="description">Please return to the homepage, or press the back button in your browser.</p>
            </div>
            <div class="ribbon">
                <h2 class="title">Important Information</h2>
                <p class="description">You may be attempting to access a page that does not exist or has been removed! Please ensure the URL is typed correctly in your navigation bar, and refresh the page.</p>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
